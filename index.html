<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neon Board</title>
    <meta
      name="description"
      content="サイバーパンクテーマの、検索・固定・編集・保存ができる使いやすい掲示板。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="app-shell">
      <header class="hero card">
        <div class="hero-copy">
          <p class="eyebrow">Neon / Bulletin</p>
          <h1>Neon Board</h1>
          <p class="lead">
            未来都市っぽい見た目で、投稿の検索・並び替え・固定・編集・削除・保存までできる軽量掲示板です。
          </p>
          <div class="hero-badges">
            <span>localStorage 保存</span>
            <span>編集・固定対応</span>
            <span>バックアップ対応</span>
          </div>
        </div>

        <div class="hero-panel">
          <div class="stat">
            <span class="stat-label">投稿数</span>
            <strong id="post-count">0</strong>
          </div>
          <div class="stat">
            <span class="stat-label">固定</span>
            <strong id="pinned-count">0</strong>
          </div>
          <div class="stat">
            <span class="stat-label">最新更新</span>
            <strong id="latest-updated">-</strong>
          </div>
        </div>
      </header>

      <section class="workspace">
        <aside class="card composer">
          <div class="section-head">
            <div>
              <p class="eyebrow">Compose</p>
              <h2>新規投稿</h2>
            </div>
            <button id="theme-toggle" class="ghost-button" type="button">
              テーマ切替
            </button>
          </div>

          <form id="post-form" class="form">
            <label>
              <span>名前</span>
              <input
                id="name"
                name="name"
                type="text"
                maxlength="30"
                placeholder="たとえば: みなと"
                autocomplete="nickname"
              />
            </label>

            <label>
              <span>ハンドル</span>
              <input
                id="handle"
                name="handle"
                type="text"
                maxlength="20"
                placeholder="@neo"
                autocomplete="username"
              />
            </label>

            <label>
              <span>カテゴリ</span>
              <select id="category" name="category">
                <option value="general">GENERAL</option>
                <option value="news">NEWS</option>
                <option value="help">HELP</option>
                <option value="idea">IDEA</option>
                <option value="bug">BUG</option>
              </select>
            </label>

            <label>
              <span>メッセージ</span>
              <textarea
                id="message"
                name="message"
                rows="7"
                maxlength="400"
                placeholder="ここにメッセージを書いて投稿"
                required
              ></textarea>
            </label>

            <div class="composer-actions">
              <p id="status" class="status" aria-live="polite"></p>
              <div class="button-row">
                <button type="button" id="clear-form" class="ghost-button">
                  クリア
                </button>
                <button type="submit" class="primary-button" id="submit-button">
                  投稿する
                </button>
              </div>
            </div>
          </form>

          <div class="utility-grid">
            <button id="export-json" class="utility-button" type="button">
              JSON 保存
            </button>
            <label class="utility-file">
              <input id="import-json" type="file" accept="application/json" />
              <span>JSON 読み込み</span>
            </label>
            <button id="seed-reset" class="utility-button danger" type="button">
              初期化
            </button>
          </div>
        </aside>

        <section class="card feed">
          <div class="section-head feed-head">
            <div>
              <p class="eyebrow">Feed</p>
              <h2>タイムライン</h2>
            </div>

            <div class="feed-controls">
              <label class="inline-field">
                <span>検索</span>
                <input id="search" type="search" placeholder="名前・内容・カテゴリ" />
              </label>

              <label class="inline-field">
                <span>並び替え</span>
                <select id="sort">
                  <option value="newest">新しい順</option>
                  <option value="oldest">古い順</option>
                  <option value="updated">更新順</option>
                </select>
              </label>

              <label class="inline-field">
                <span>絞り込み</span>
                <select id="filter-category">
                  <option value="all">すべて</option>
                  <option value="general">GENERAL</option>
                  <option value="news">NEWS</option>
                  <option value="help">HELP</option>
                  <option value="idea">IDEA</option>
                  <option value="bug">BUG</option>
                </select>
              </label>
            </div>
          </div>

          <div class="toolbar">
            <span id="result-count" class="chip">0 件</span>
            <span class="hint">カード右上の操作で固定・編集・削除ができます</span>
          </div>

          <div id="posts" class="posts" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <template id="post-template">
      <article class="post">
        <div class="post-header">
          <div class="post-meta">
            <span class="badge"></span>
            <div class="identity">
              <strong class="post-name"></strong>
              <span class="post-handle"></span>
            </div>
          </div>
          <div class="post-controls">
            <button type="button" class="icon-button pin-btn" aria-label="固定">
              ☆
            </button>
            <button type="button" class="icon-button edit-btn" aria-label="編集">
              ✎
            </button>
            <button type="button" class="icon-button delete-btn" aria-label="削除">
              ×
            </button>
          </div>
        </div>

        <p class="post-message"></p>

        <div class="post-footer">
          <time class="post-time"></time>
          <span class="post-updated"></span>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
